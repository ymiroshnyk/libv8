name: Build for macOS
description: 'Build V8 for macOS'

inputs:
  archive-name:
    description: 'Base name of the archive to create'
    default: v8_macOS
    required: false
    type: string

runs:
  using: "composite"
  steps:
    - name: Restore CCache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ${{ runner.os }}-${{ runner.arch }}:libv8:ccache:${{ github.run_number }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}:libv8:ccache:

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Select Xcode
      shell: bash
      run: |
        # Pin Xcode to avoid SDK incompatibilities with V8 build system.
        # List available versions and pick the latest 16.x that is not beta.
        ls /Applications/ | grep Xcode | sort -V
        if [ -d "/Applications/Xcode_16.2.app" ]; then
          sudo xcode-select -s /Applications/Xcode_16.2.app
        elif [ -d "/Applications/Xcode_16.1.app" ]; then
          sudo xcode-select -s /Applications/Xcode_16.1.app
        fi
        xcode-select -p
        xcodebuild -version

    - name: Setup Build Tools
      shell: bash
      run: |
        brew install ccache

        echo "$(brew --prefix ccache)/libexec" >> "$GITHUB_PATH"
        echo "CCACHE_CPP2=yes" >> "$GITHUB_ENV"
        echo "CCACHE_SLOPPINESS=time_macros" >> "$GITHUB_ENV"

        ccacheDir="${GITHUB_WORKSPACE}/.ccache"
        test -d "$ccacheDir" || mkdir "$ccacheDir"

        echo "CCACHE_DIR=$ccacheDir" >> "$GITHUB_ENV"

    - name: Download V8 Source
      shell: bash
      run: ./v8_download.sh

    - name: Compile V8
      shell: bash
      run: ./v8_compile.sh

    - name: Show CCache Status
      shell: bash
      run: ccache -s

    - name: Archive V8
      shell: bash
      run: ./archive.sh ${{ inputs.archive-name }}

    - name: Test V8
      shell: bash
      run: ./v8_test.sh
